<!DOCTYPE html>
<html>
<head>
<title>Crime Investigation Game</title>

<style>

/* ===== BACKGROUND ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url('https://images.unsplash.com/photo-1503435980610-a51f3ddfee50') no-repeat center center fixed;
  background-size: cover;
  color: white;
  overflow: hidden;
}

/* DARK OVERLAY */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(0,0,0,0.6), rgba(0,0,0,0.95));
}

/* MOVING LIGHT */
.light {
  position: absolute;
  width: 200%;
  height: 200%;
  background: linear-gradient(120deg, transparent, rgba(255,0,0,0.15), transparent);
  animation: moveLight 10s linear infinite;
}

@keyframes moveLight {
  0% { transform: translate(-50%, -50%) rotate(0deg); }
  100% { transform: translate(50%, 50%) rotate(360deg); }
}

/* FOG */
.fog {
  position: absolute;
  width: 200%;
  height: 200%;
  background: url('https://i.imgur.com/8QZ7Z6T.png');
  opacity: 0.05;
  animation: fogMove 60s linear infinite;
}

@keyframes fogMove {
  0% { transform: translate(0,0); }
  100% { transform: translate(-50%, -50%); }
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  background: rgba(0,0,0,0.6);
  border-bottom: 2px solid crimson;
  animation: pulse 2s infinite alternate;
  position: relative;
  z-index: 2;
}

@keyframes pulse {
  from { text-shadow: 0 0 10px red; }
  to { text-shadow: 0 0 30px crimson; }
}

/* LAYOUT */
.container {
  display: flex;
  justify-content: space-around;
  gap: 20px;
  margin-top: 60px;
  position: relative;
  z-index: 2;
  perspective: 1000px;
}

/* PANELS */
.panel {
  width: 28%;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 0 30px rgba(255,0,0,0.15);
  transition: 0.4s;
}

.panel:hover {
  transform: rotateY(5deg) scale(1.03);
  box-shadow: 0 0 60px rgba(255,0,0,0.4);
}

.center {
  text-align: center;
}

/* BUTTON */
.start-btn {
  margin-top: 15px;
  padding: 12px 18px;
  background: crimson;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.start-btn:hover {
  transform: scale(1.1);
  background: red;
  box-shadow: 0 0 20px red;
}

/* SUSPECT */
.suspect {
  background: rgba(0,0,0,0.4);
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.suspect:hover {
  background: crimson;
  box-shadow: 0 0 15px red;
  transform: translateX(5px);
}

/* SCORE */
#scoreBoard {
  position: fixed;
  top: 80px;
  right: 20px;
  background: rgba(0,0,0,0.7);
  padding: 10px;
  border-radius: 10px;
  border: 1px solid crimson;
  z-index: 9999;
}

/* CHAT DRAG */
#dragChat {
  position: fixed;
  top: 200px;
  left: 20px;
  background: crimson;
  padding: 12px 18px;
  border-radius: 50px;
  cursor: grab;
  z-index: 9999;
}

/* EVIDENCE */
#evidenceList div {
  margin: 5px 0;
  padding: 5px;
  background: rgba(0,0,0,0.4);
  border-radius: 5px;
}

/* CRIME SCENE BOX */
.scene-box {
  position: relative;
  width: 100%;
  border-radius: 15px;
  overflow: hidden;
  margin-bottom: 15px;
  box-shadow: 0 0 40px rgba(255,0,0,0.3);
}

.scene-box img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  filter: grayscale(100%) contrast(120%);
}

.scene-overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(255,0,0,0.2));
}

.scene-text {
  position: absolute;
  bottom: 10px;
  left: 15px;
  font-size: 14px;
  color: #ff4d4d;
  text-shadow: 0 0 10px red;
}

/* END SCREEN */
#endScreen {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  z-index:99999;
  text-align:center;
  padding-top:150px;
}

</style>
</head>

<body>

<div class="overlay"></div>
<div class="light"></div>
<div class="fog"></div>

<header>🕵️ Crime Investigation Game</header>

<div id="scoreBoard">
🎯 Score: <span id="score">0</span>
</div>

<div id="dragChat" onmousedown="dragStart(event)">💬 Chat</div>

<div class="container">

  <!-- LEFT -->
  <div class="panel">
    <h3>📁 Case File</h3>
    <p>Victim: Mr. Roy</p>
    <p>Location: Hotel Room</p>
    <p>Time: 9 PM</p>

    <hr>

    <h3>🧾 Evidence Bag</h3>
    <div id="evidenceList">
      <p style="opacity:0.6;">No evidence collected</p>
    </div>

    <button class="start-btn" onclick="collectEvidence()" style="width:100%">
      🔍 Collect Evidence
    </button>
  </div>

  <!-- CENTER -->
  <div class="panel center">

    <div class="scene-box">
      <img src="https://images.unsplash.com/photo-1542744173-8e7e53415bb0">
      <div class="scene-overlay"></div>
      <div class="scene-text">CRIME SCENE UNDER INVESTIGATION</div>
    </div>

    <h2>Detective Ready?</h2>
    <button class="start-btn" onclick="startInvestigation()">▶ Start Investigation</button>

  </div>

  <!-- RIGHT -->
  <div class="panel">
    <h3>👤 Suspects</h3>

    <div class="suspect" onclick="askSuspect('John')">John (Manager)</div>
    <div class="suspect" onclick="askSuspect('Sarah')">Sarah (Guest)</div>
    <div class="suspect" onclick="askSuspect('Alex')">Alex (Staff)</div>

    <button class="start-btn" onclick="accuseSuspect('John')" style="width:100%;">
      ⚖️ Accuse Suspect
    </button>
  </div>

</div>

<!-- END -->
<div id="endScreen">
  <h1 id="endTitle"></h1>
  <p id="endMessage"></p>
  <h2 id="finalScore"></h2>
  <button onclick="restartGame()" class="start-btn">Restart</button>
</div>

<!-- WATSON -->
<script>
window.watsonAssistantChatOptions = {
  integrationID: "73a7d4b6-a9e6-477d-ba41-8db3f52db673",
  region: "eu-gb",
  serviceInstanceID: "e3431abb-31f0-42bd-b5a7-9fcca7655352",
  onLoad: function(instance) {
    window.chatInstance = instance;
    instance.render();
  }
};

setTimeout(()=>{
  let t=document.createElement("script");
  t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/latest/WatsonAssistantChatEntry.js";
  document.head.appendChild(t);
},0);
</script>

<script>

let score=0, evidenceBag=[];
let offsetX=0, offsetY=0, dragging=false;

function updateScore(v){ score+=v; document.getElementById("score").innerText=score; }

function startInvestigation(){ window.chatInstance?.openWindow(); updateScore(5); }

function askSuspect(name){
  window.chatInstance?.openWindow();
  setTimeout(()=>{window.chatInstance.send({input:{text:"talk to "+name}})},500);
  updateScore(10);
}

function dragStart(e){
  dragging=true;
  offsetX=e.clientX-e.target.offsetLeft;
  offsetY=e.clientY-e.target.offsetTop;
  document.onmousemove=dragMove;
  document.onmouseup=()=>dragging=false;
}

function dragMove(e){
  if(!dragging)return;
  let el=document.getElementById("dragChat");
  el.style.left=(e.clientX-offsetX)+"px";
  el.style.top=(e.clientY-offsetY)+"px";
}

function collectEvidence(){
  let pool=["CCTV","Knife","Fingerprint","Door Lock","Witness"];
  let item=pool[Math.floor(Math.random()*pool.length)];
  if(!evidenceBag.includes(item)){
    evidenceBag.push(item);
    updateEvidenceUI();
    updateScore(5);
  } else collectEvidence();
}

function updateEvidenceUI(){
  let box=document.getElementById("evidenceList");
  box.innerHTML="";
  evidenceBag.forEach(i=>{
    let d=document.createElement("div");
    d.innerText="🧾 "+i;
    box.appendChild(d);
  });
}

function showEnd(t,m){
  document.getElementById("endScreen").style.display="block";
  document.getElementById("endTitle").innerText=t;
  document.getElementById("endMessage").innerText=m;
  document.getElementById("finalScore").innerText="Score: "+score;
}

function accuseSuspect(name){
  if(evidenceBag.length<3){ showEnd("❌ Failed","Not enough evidence"); return; }
  if(name==="John"){ updateScore(50); showEnd("🎉 Case Solved","Correct suspect!"); }
  else { updateScore(-20); showEnd("❌ Failed","Wrong suspect!"); }
}

function restartGame(){ location.reload(); }

</script>

</body>
</html>
